name: CI/CD Backend
env:
  REPO_NAME: ${{ github.event.repository.name }}
on:
  pull_request:
    paths:
      - 'backend/**'
      - '!backend/README.md'
  workflow_dispatch: 

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: 'Checkout GitHub Action'
      uses: actions/checkout@v4
     
    - name: 'Setup Python'
      uses: actions/setup-python@v5
      with:
        python-version: '3.14.x'
    - run: |
        python -m pip install --upgrade pip
        pip install pytest
        if [ -f backend/pyproject.toml ]; then cd backend && pip install -e ".[test]"; fi
    - name: Run tests
      run: pytest
